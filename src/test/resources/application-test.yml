spring:
  datasource:
    url: jdbc:h2:mem:a1c_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Flyway migrations use PostgreSQL-specific DDL (JSONB, triggers); skip in the
  # H2 smoke-test context where Hibernate generates the schema instead.
  flyway:
    enabled: false

admin:
  secret: test-secret

logging:
  level:
    com.a1cchallenge: INFO

# =============================================================================
# A1C Challenge — Nginx reverse proxy (privacy-hardened)
#
# Implements the build-trail's infrastructure requirements:
#   - strips IP / User-Agent / Referer headers BEFORE they reach Spring Boot
#     (Data Schema Section 1.4: "IP addresses stripped at ingress proxy")
#   - rate-limits /enroll without logging the IP
#   - anonymized access-log format (no $remote_addr, no $http_user_agent)
#
# Drop into /etc/nginx/conf.d/ and adjust server_name + upstream as needed.
# =============================================================================

# --- Anonymized log format: NO IP, NO User-Agent, NO Referer -----------------
log_format anonymized '[$time_local] "$request" $status $body_bytes_sent';

# --- Rate-limit zone for enrollment (5 requests/min/IP, IP not logged) --------
limit_req_zone $binary_remote_addr zone=enroll_limit:10m rate=5r/m;

upstream spring_boot_backend {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Strip identifying headers before they ever touch the application layer.
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Real-IP "";
    proxy_set_header User-Agent "";
    proxy_set_header Referer "";
    proxy_set_header X-Forwarded-Host "";

    access_log /var/log/nginx/a1c_access.log anonymized;

    # Enrollment: rate-limited, anonymized.
    location /api/v1/participants/enroll {
        limit_req zone=enroll_limit burst=10 nodelay;
        access_log /var/log/nginx/enroll_access.log anonymized;
        proxy_pass http://spring_boot_backend;
    }

    # Everything else.
    location / {
        proxy_pass http://spring_boot_backend;
    }
}
